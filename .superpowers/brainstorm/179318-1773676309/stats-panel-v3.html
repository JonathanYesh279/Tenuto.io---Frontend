<h2>Room Insights — Liquid Glass with #43a579 / #082753</h2>
<p class="subtitle">Deep navy + emerald green on frosted glass</p>

<div style="padding: 24px; background: #FAFAFA; direction: rtl; font-family: 'Assistant', system-ui, sans-serif; border-radius: 12px;">

    "></div>
    <div style="
      position: absolute; bottom: -20%; left: -10%; width: 45%; height: 45%;

            <div style="display: flex; justify-content: space-between; align-items: center;">
              <span style="font-size: 11px; font-weight: 700; color: #082753;">חדר 8</span>
              <span style="
                font-size: 10px; font-weight: 700; color: #43a579;
                background: rgba(67,165,121,0.08);
                padding: 2px 10px; border-radius: 99px;
                border: 1px solid rgba(67,165,121,0.12);

            <div style="display: flex; justify-content: space-between; align-items: center;">
              <span style="font-size: 11px; font-weight: 700; color: #082753;">חדר 2</span>
